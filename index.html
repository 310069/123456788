<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龍紫綺的學習歷程作品集</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4a373;
            --bg: #f9f7f2;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg); color: #333; overflow-x: hidden; }

        header {
            background: rgba(44, 62, 80, 0.95);
            backdrop-filter: blur(10px);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.3rem; font-weight: bold; }

        .nav { display: flex; list-style: none; }
        .dropdown { position: relative; margin-left: 20px; cursor: pointer; padding: 10px; font-weight: bold; }
        
        .dropdown-content { 
            display: none; position: absolute; background: white; 
            min-width: 140px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-radius: 8px; top: 45px; right: 0;
        }
        .dropdown:hover .dropdown-content { display: block; animation: fadeIn 0.3s; }
        .dropdown-content a { color: #333; padding: 10px 15px; display: block; text-decoration: none; border-bottom: 1px solid #eee; font-size: 14px; }
        .dropdown-content a:hover { background: var(--accent); color: white; }

        /* 輪播圖 */
        .swiper-section { padding: 40px 0; background: #fff; }
        .swiper { width: 90%; max-width: 800px; height: 500px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #fff; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; }
        
        .slide-caption { position: absolute; bottom: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px 25px; border-radius: 30px; font-size: 1rem; }

        /* 內容區 */
        .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom: 5px solid var(--accent); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .tag { background: var(--accent); color: white; padding: 3px 10px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">一勤 21 龍紫綺 | 學習歷程檔案</div>
    <div class="nav">
        <div class="dropdown">報告分類 ▾
            <div class="dropdown-content">
                <a href="#">國文</a><a href="#">數學</a><a href="#">英文</a>
                <a href="#">地理</a><a href="#">公民</a><a href="#">化學</a>
                <a href="#">地科</a><a href="#">物理</a><a href="#">生物</a>
            </div>
        </div>
    </div>
</header>

<section class="swiper-section" data-aos="fade-down">
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://upload.cc/i1/2024/04/10/Jm5v8G.png" onerror="this.src='https://via.placeholder.com/800x600?text=圖片載入中'" alt="自主學習-營養學">
                <div class="slide-caption">自主學習：營養學報告封面</div>
            </div>
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1200" alt="報告預覽">
                <div class="slide-caption">精選專案展示</div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
</section>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 40px;" data-aos="fade-up">所有研究報告</h2>
    <div class="grid">
        <div class="card" data-aos="fade-up" data-aos-delay="100">
            <span class="tag">自主學習</span>
            <h3>營養學研究報告</h3>
            <p>透過日常飲食數據分析，探討營養素對青少年成長的影響與建議建議攝取量。</p>
        </div>
        <div class="card" data-aos="fade-up" data-aos-delay="200">
            <span class="tag">英文</span>
            <h3>英文戲劇專案</h3>
            <p>腳本撰寫、角色台詞背誦以及最終演出的完整歷程紀錄。</p>
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 40px; color: #888;">
    &copy; 2026 龍紫綺的作品集 | 版權所有
</footer>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    // 初始化動畫
    AOS.init({ duration: 1000, once: false });

    // 初始化輪播圖
    const swiper = new Swiper('.swiper', {
        loop: true,
        autoplay: { delay: 4000, disableOnInteraction: false },
        pagination: { el: '.swiper-pagination', clickable: true },
        navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
    });
</script>

</body>
</html>
